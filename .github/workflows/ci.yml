name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend: Lint + Type Check ─────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements/development.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy apps/ vitali/ --ignore-missing-imports
        continue-on-error: true  # Type annotations are a known follow-up (post-Sprint 15)

  # ─── Backend: Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vitali_test
          POSTGRES_USER: vitali
          POSTGRES_PASSWORD: vitali
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://vitali:vitali@localhost:5432/vitali_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: vitali.settings.development
      SECRET_KEY: ci-test-secret-key-not-for-production
      FIELD_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Install WeasyPrint OS deps (S-065)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info \
            fonts-liberation

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: WeasyPrint smoke test (DX-08)
        run: python -c "from weasyprint import HTML; HTML(string='<h1>CI OK</h1>').write_pdf('/tmp/ci-smoke.pdf'); print('weasyprint OK')"

      - name: Run migrations
        run: python manage.py migrate_schemas --shared

      - name: Run tests
        run: pytest --cov=apps --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: backend

  # ─── Frontend: Lint + Type Check ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run type-check

  # ─── Frontend: E2E (Playwright) ─────────────────────────────────────────────
  frontend-e2e:
    name: Frontend — E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint]
    # S-111 (Sprint 22): continue-on-error removed. Tenant bootstrap now wires
    # the Tenant + Domain rows so django-tenants can resolve the testclinic schema.

    env:
      # S-091: E2E_MODE enables the test-only invitation token endpoint
      # (apps/core/checks.py core.E001 enforces that E2E_MODE=True requires a
      # DB name ending with _test — POSTGRES_DB below satisfies that check).
      E2E_MODE: "true"
      POSTGRES_DB: vitali_test
      # CI runs the production frontend image (deps baked) but needs development
      # Django settings — production settings.production module doesn't wire the
      # django-tenants schema engine (migrate_schemas would fail with
      # 'DatabaseWrapper has no attribute set_schema').
      DJANGO_SETTINGS_MODULE: vitali.settings.development

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Map test tenant subdomain
        run: echo "127.0.0.1 testclinic.localhost" | sudo tee -a /etc/hosts

      - name: Boot stack (production frontend image — skip dev override)
        run: |
          cp .env.example .env
          # CI runs frontend from the production Dockerfile (node server.js, deps baked in).
          # The dev override (docker-compose.override.yml) does `npm install && npm run dev`
          # which on a cold CI runner takes 5-8 min — too slow + flaky for E2E.
          # `--file docker-compose.yml` excludes the override.
          docker compose --file docker-compose.yml up -d
          echo "Waiting for Django..."
          timeout 120 bash -c 'until docker compose --file docker-compose.yml exec -T django python -c "import sys; sys.exit(0)" 2>/dev/null; do sleep 3; done'
          echo "Waiting for Next.js on :3000..."
          timeout 180 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 5; done' || {
            echo "::group::Next.js logs (debug)"
            docker compose --file docker-compose.yml logs nextjs --tail 100
            echo "::endgroup::"
            exit 1
          }
          echo "Stack is ready."

      - name: Run migrations
        run: docker compose --file docker-compose.yml exec -T django python manage.py migrate_schemas --shared

      - name: Bootstrap test tenant
        run: |
          docker compose --file docker-compose.yml exec -T django python manage.py shell -c "
          from apps.core.models import Tenant, Domain
          # Public tenant (django-tenants reserves schema_name='public' for cross-tenant data)
          public, _ = Tenant.objects.get_or_create(schema_name='public', defaults={'name': 'public'})
          Domain.objects.get_or_create(domain='localhost', defaults={'tenant': public, 'is_primary': True})
          # Test clinic tenant
          clinic, _ = Tenant.objects.get_or_create(schema_name='testclinic', defaults={'name': 'Test Clinic'})
          Domain.objects.get_or_create(domain='testclinic.localhost', defaults={'tenant': clinic, 'is_primary': True})
          print(f'Tenant bootstrap: public={public.id}, clinic={clinic.id}')
          "

      - name: Create test superuser in clinic tenant
        run: |
          docker compose --file docker-compose.yml exec -T django python manage.py shell -c "
          from apps.core.models import Tenant, User
          from django_tenants.utils import schema_context
          clinic = Tenant.objects.get(schema_name='testclinic')
          with schema_context(clinic.schema_name):
              if not User.objects.filter(email='admin@test.com').exists():
                  User.objects.create_superuser(email='admin@test.com', password='AdminPass1!')
                  print('Superuser created in testclinic schema')
              else:
                  print('Superuser already exists')
          "

      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          E2E_BASE_URL: http://testclinic.localhost:3000
          E2E_BACKEND_URL: http://localhost:8000
          E2E_MODE: "true"
          E2E_ADMIN_EMAIL: admin@test.com
          E2E_ADMIN_PASSWORD: AdminPass1!
          CI: "true"

  # ─── Docker Build Validation ─────────────────────────────────────────────────
  docker-validate:
    name: Docker — Validate Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Seed .env from example
        run: cp .env.example .env

      - name: Validate docker-compose config
        run: docker compose config

      - name: Build backend image
        run: docker build ./backend -t vitali-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t vitali-frontend:ci
