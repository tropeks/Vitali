name: Deploy — Staging

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-frontend
  VIEWER_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-viewer

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push Vitali Imagem
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./docker/ohif
          push: true
          tags: |
            ${{ env.VIEWER_IMAGE }}:sha-${{ github.sha }}
            ${{ env.VIEWER_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.VIEWER_IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    # Skip SSH deploy until staging host is provisioned and STAGING_ENABLED repo var is set to "true".
    # Build-and-push always runs so GHCR images stay fresh; flip the var to enable end-to-end deploys.
    if: vars.STAGING_ENABLED == 'true'
    # Shared with release-deploy.yml so a master push and a tag release never
    # deploy to the staging host at the same time.
    concurrency:
      group: staging-host-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/vitali

            # Tag currently running images as rollback targets before pulling new ones.
            # If the deploy fails and smoke tests don't pass, the rollback step below
            # restores these images. Images must be tagged before pull overwrites :latest.
            # Use the actual GHCR image names (not local aliases) so docker tag succeeds.
            echo "Tagging current images as rollback..."
            BACKEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-backend"
            FRONTEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-frontend"
            docker tag "${BACKEND_IMG}:latest" "${BACKEND_IMG}:rollback" 2>/dev/null || true
            docker tag "${FRONTEND_IMG}:latest" "${FRONTEND_IMG}:rollback" 2>/dev/null || true

            # Pull new images and restart services
            echo "Pulling images (tag: sha-${{ github.sha }})..."
            IMAGE_TAG=sha-${{ github.sha }} \
            GHCR_REPO=${{ github.repository_owner }} \
              docker compose -p vitali-staging --env-file .env.staging -f docker-compose.staging.yml pull

            echo "Restarting services..."
            IMAGE_TAG=sha-${{ github.sha }} \
            GHCR_REPO=${{ github.repository_owner }} \
              docker compose -p vitali-staging --env-file .env.staging -f docker-compose.staging.yml up -d

            echo "Running migrations..."
            docker compose -p vitali-staging --env-file .env.staging -f docker-compose.staging.yml exec -T django \
              python manage.py migrate_schemas --shared --noinput

            # Tenant-only apps (organization, governance, EMR MPI, etc.) live in
            # every clinic schema and are not covered by --shared.
            docker compose -p vitali-staging --env-file .env.staging -f docker-compose.staging.yml exec -T django \
              python manage.py migrate_schemas --tenant --noinput

            echo "Collecting static files..."
            docker compose -p vitali-staging --env-file .env.staging -f docker-compose.staging.yml exec -T django \
              python manage.py collectstatic --noinput

      - name: Run smoke tests
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/vitali
            BASE_URL=${{ secrets.STAGING_BASE_URL }} \
            COMPOSE_FILE=docker-compose.staging.yml \
            COMPOSE_ENV_FILE=.env.staging \
            COMPOSE_PROJECT_NAME=vitali-staging \
              bash scripts/smoke_test.sh

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "Smoke tests failed — rolling back to previous images..."
            cd /opt/vitali
            BACKEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-backend"
            FRONTEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-frontend"
            docker tag "${BACKEND_IMG}:rollback" "${BACKEND_IMG}:latest" 2>/dev/null || true
            docker tag "${FRONTEND_IMG}:rollback" "${FRONTEND_IMG}:latest" 2>/dev/null || true
            docker compose -p vitali-staging --env-file .env.staging -f docker-compose.staging.yml up -d
            echo "Rollback complete. Verify manually: docker compose logs --tail=50"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging deploy failed for commit ${{ github.sha }}. Rollback attempted. Check logs."
