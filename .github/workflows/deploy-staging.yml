name: Deploy — Staging

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    # Skip SSH deploy until staging host is provisioned and STAGING_ENABLED repo var is set to "true".
    # Build-and-push always runs so GHCR images stay fresh; flip the var to enable end-to-end deploys.
    if: vars.STAGING_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/vitali

            # Tag currently running images as rollback targets before pulling new ones.
            # If the deploy fails and smoke tests don't pass, the rollback step below
            # restores these images. Images must be tagged before pull overwrites :latest.
            # Use the actual GHCR image names (not local aliases) so docker tag succeeds.
            echo "Tagging current images as rollback..."
            BACKEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-backend"
            FRONTEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-frontend"
            docker tag "${BACKEND_IMG}:latest" "${BACKEND_IMG}:rollback" 2>/dev/null || true
            docker tag "${FRONTEND_IMG}:latest" "${FRONTEND_IMG}:rollback" 2>/dev/null || true

            # Pull new images and restart services
            echo "Pulling images (tag: sha-${{ github.sha }})..."
            IMAGE_TAG=sha-${{ github.sha }} \
            GHCR_REPO=${{ github.repository_owner }}/Vitali \
              docker compose -f docker-compose.staging.yml pull

            echo "Restarting services..."
            IMAGE_TAG=sha-${{ github.sha }} \
            GHCR_REPO=${{ github.repository_owner }}/Vitali \
              docker compose -f docker-compose.staging.yml up -d

            echo "Running migrations..."
            docker compose -f docker-compose.staging.yml exec -T django \
              python manage.py migrate_schemas --shared --noinput

            echo "Collecting static files..."
            docker compose -f docker-compose.staging.yml exec -T django \
              python manage.py collectstatic --noinput

      - name: Run smoke tests
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/vitali
            BASE_URL=${{ secrets.STAGING_BASE_URL }} bash scripts/smoke_test.sh

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "Smoke tests failed — rolling back to previous images..."
            cd /opt/vitali
            BACKEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-backend"
            FRONTEND_IMG="ghcr.io/${{ github.repository_owner }}/vitali-frontend"
            docker tag "${BACKEND_IMG}:rollback" "${BACKEND_IMG}:latest" 2>/dev/null || true
            docker tag "${FRONTEND_IMG}:rollback" "${FRONTEND_IMG}:latest" 2>/dev/null || true
            docker compose -f docker-compose.staging.yml up -d
            echo "Rollback complete. Verify manually: docker compose logs --tail=50"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging deploy failed for commit ${{ github.sha }}. Rollback attempted. Check logs."
