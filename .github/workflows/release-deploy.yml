name: Release — Publish Images (semver tag)

# Triggered by pushing a semantic-version tag (e.g. `v1.4.0`):
#
#   git tag v1.4.0 && git push origin v1.4.0
#
# Builds backend, frontend, and viewer images and publishes them to GHCR with
# both the semver tag and commit SHA. Deployment is intentionally local to the
# PVE host because it has no inbound management ports.

on:
  push:
    tags:
      - "v*.*.*"

# Serialize image publication globally so two tags cannot race on shared tags.
concurrency:
  group: release-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-frontend
  VIEWER_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-viewer

jobs:
  # ─── Build & push the release images ────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    # Guard against forks/mirrors: a v*.*.* tag pushed to any fork with Actions
    # enabled would otherwise run this pipeline there. Downstream deploy jobs
    # inherit the guard through `needs`.
    if: github.repository == 'tropeks/Vitali'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push Vitali Imagem viewer
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./docker/ohif
          push: true
          tags: |
            ${{ env.VIEWER_IMAGE }}:${{ github.ref_name }}
            ${{ env.VIEWER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.VIEWER_IMAGE }}:latest
          cache-to: type=inline
