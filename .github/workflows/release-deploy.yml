name: Release — Deploy (semver tag)

# Triggered by pushing a semantic-version tag (e.g. `v1.4.0`):
#
#   git tag v1.4.0 && git push origin v1.4.0
#
# Pipeline (no manual SSH steps — issue #125):
#   1. build-and-push  — build backend + frontend images, push to GHCR tagged with
#                        the semver (`v1.4.0`) and the commit SHA (`sha-<sha>`).
#   2. deploy-staging  — pull the semver images on the staging host and roll the
#                        stack, then run smoke tests (auto-rollback on failure).
#   3. deploy-production — same on the production host, but GATED behind the
#                        `production` GitHub Environment whose required reviewers
#                        enforce manual approval before the job runs.
#
# Until each host is provisioned, the deploy jobs stay dormant: flip the repo
# variables STAGING_ENABLED / PROD_ENABLED to "true" to enable them. The build
# job always runs so released images land in GHCR regardless.

on:
  push:
    tags:
      - "v*.*.*"

# Serialize releases globally (not per-ref): two tags pushed back-to-back must
# never SSH-deploy to the same hosts concurrently. Let an in-flight release
# finish rather than cancelling a deploy half-way.
concurrency:
  group: release-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-frontend
  VIEWER_IMAGE: ghcr.io/${{ github.repository_owner }}/vitali-viewer

jobs:
  # ─── Build & push the release images ────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    # Guard against forks/mirrors: a v*.*.* tag pushed to any fork with Actions
    # enabled would otherwise run this pipeline there. Downstream deploy jobs
    # inherit the guard through `needs`.
    if: github.repository == 'tropeks/Vitali'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push Vitali Imagem viewer
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./docker/ohif
          push: true
          tags: |
            ${{ env.VIEWER_IMAGE }}:${{ github.ref_name }}
            ${{ env.VIEWER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.VIEWER_IMAGE }}:latest
          cache-to: type=inline

  # ─── Deploy to Staging (automatic) ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    # Stays dormant until the staging host is provisioned and STAGING_ENABLED="true".
    if: vars.STAGING_ENABLED == 'true'
    # Shared with deploy-staging.yml so a master push and a tag release never
    # deploy to the staging host at the same time.
    concurrency:
      group: staging-host-deploy
      cancel-in-progress: false

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/vitali
            GHCR_REPO=${{ github.repository_owner }}
            BACKEND_IMG="ghcr.io/${GHCR_REPO}/vitali-backend"
            FRONTEND_IMG="ghcr.io/${GHCR_REPO}/vitali-frontend"
            VIEWER_IMG="ghcr.io/${GHCR_REPO}/vitali-viewer"

            # Capture the images the stack is currently running (by ID) and alias
            # them to :rollback so the failure handler can restore them. Capturing
            # by container image ID works even though we deploy by semver tag.
            echo "Tagging current images as rollback..."
            for svc_img in "django:${BACKEND_IMG}" "nextjs:${FRONTEND_IMG}" "vitali-viewer:${VIEWER_IMG}"; do
              svc="${svc_img%%:*}"; img="${svc_img#*:}"
              cid=$(IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
                docker compose -f docker-compose.staging.yml ps -q "$svc" 2>/dev/null | head -1 || true)
              if [ -n "$cid" ]; then
                docker tag "$(docker inspect -f '{{.Image}}' "$cid")" "${img}:rollback" 2>/dev/null || true
              fi
            done

            echo "Pulling images (tag: ${IMAGE_TAG})..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.staging.yml pull

            echo "Restarting services..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.staging.yml up -d

            echo "Running migrations..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.staging.yml exec -T django \
                python manage.py migrate_schemas --shared --noinput
              docker compose -f docker-compose.staging.yml exec -T django \
                python manage.py migrate_schemas --tenant --noinput

            echo "Collecting static files..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.staging.yml exec -T django \
              python manage.py collectstatic --noinput

      - name: Run smoke tests
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/vitali
            BASE_URL=${{ secrets.STAGING_BASE_URL }} \
            COMPOSE_FILE=docker-compose.staging.yml \
            COMPOSE_ENV_FILE=.env.staging \
            IMAGE_TAG="$IMAGE_TAG" \
            GHCR_REPO=${{ github.repository_owner }} \
              bash scripts/smoke_test.sh

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "Release deploy failed — rolling back to previous images..."
            cd /opt/vitali
            # IMAGE_TAG=rollback makes compose resolve the :rollback aliases tagged
            # before the pull above (local images — no registry fetch needed).
            IMAGE_TAG=rollback GHCR_REPO=${{ github.repository_owner }} \
              docker compose -f docker-compose.staging.yml up -d
            echo "Rollback complete. Verify manually: docker compose logs --tail=50"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging release deploy failed for ${{ github.ref_name }}. Rollback attempted. Check logs."

  # ─── Deploy to Production (manual approval) ─────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    # The `production` Environment must be configured with required reviewers in
    # repo Settings → Environments → production. GitHub then pauses this job for
    # manual approval before any step runs — that is the "prod via aprovação
    # manual" gate. Stays dormant until the prod host exists and PROD_ENABLED="true".
    environment: production
    if: vars.PROD_ENABLED == 'true'
    # Only one production deploy at a time, ever.
    concurrency:
      group: production-host-deploy
      cancel-in-progress: false

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/vitali
            GHCR_REPO=${{ github.repository_owner }}
            BACKEND_IMG="ghcr.io/${GHCR_REPO}/vitali-backend"
            FRONTEND_IMG="ghcr.io/${GHCR_REPO}/vitali-frontend"
            VIEWER_IMG="ghcr.io/${GHCR_REPO}/vitali-viewer"

            echo "Tagging current images as rollback..."
            for svc_img in "django:${BACKEND_IMG}" "nextjs:${FRONTEND_IMG}" "vitali-viewer:${VIEWER_IMG}"; do
              svc="${svc_img%%:*}"; img="${svc_img#*:}"
              cid=$(IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
                docker compose -f docker-compose.prod.yml ps -q "$svc" 2>/dev/null | head -1 || true)
              if [ -n "$cid" ]; then
                docker tag "$(docker inspect -f '{{.Image}}' "$cid")" "${img}:rollback" 2>/dev/null || true
              fi
            done

            echo "Pulling images (tag: ${IMAGE_TAG})..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.prod.yml pull

            echo "Restarting services..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.prod.yml up -d

            echo "Running migrations..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.prod.yml exec -T django \
              python manage.py migrate_schemas --shared --noinput
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.prod.yml exec -T django \
              python manage.py migrate_schemas --tenant --noinput

            echo "Collecting static files..."
            IMAGE_TAG="$IMAGE_TAG" GHCR_REPO="$GHCR_REPO" \
              docker compose -f docker-compose.prod.yml exec -T django \
              python manage.py collectstatic --noinput

      - name: Run smoke tests
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/vitali
            BASE_URL=${{ secrets.PROD_BASE_URL }} \
            COMPOSE_FILE=docker-compose.prod.yml \
            IMAGE_TAG="$IMAGE_TAG" \
            GHCR_REPO=${{ github.repository_owner }} \
              bash scripts/smoke_test.sh

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5 (SHA-pinned; Dependabot bumps)
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "Production release deploy failed — rolling back to previous images..."
            cd /opt/vitali
            IMAGE_TAG=rollback GHCR_REPO=${{ github.repository_owner }} \
              docker compose -f docker-compose.prod.yml up -d
            echo "Rollback complete. Verify manually: docker compose logs --tail=50"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production release deploy failed for ${{ github.ref_name }}. Rollback attempted. Check logs."
