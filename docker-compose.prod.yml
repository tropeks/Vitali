# Vitali — Production Compose
# ─────────────────────────────────────────────────────────────────────────────
# Built on docker-compose.staging.yml. Differences:
#   - Nginx terminates TLS (:443) using certbot-managed certs; :80 redirects.
#   - certbot service renews certs automatically; nginx reloads periodically to
#     pick up renewals (standard compose certbot pattern).
#   - db-backup runs by default (not behind a profile) and does offsite + encrypted
#     uploads when the BACKUP_S3_* / BACKUP_ENCRYPTION_KEY envs are set.
#   - Flower (Celery monitoring) behind HTTP basic auth.
#   - Uptime Kuma for external health monitoring.
#   - Secrets come from a host-only env file (see docs/SECRETS.md), never the repo.
#
# Usage (see docs/DEPLOY.md):
#   bash scripts/gen_secrets.sh > /etc/vitali/secrets.env && chmod 600 /etc/vitali/secrets.env
#   # set TLS_DOMAIN + TLS_LIVE_DIR + ACME_EMAIL in the env file too
#   GHCR_REPO=tropeks docker compose -f docker-compose.prod.yml --env-file /etc/vitali/secrets.env up -d

services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitali}
      POSTGRES_USER: ${POSTGRES_USER:-vitali}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitali}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 2g
    cpus: 2.0

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  # ─── Django (Gunicorn) ────────────────────────────────────────────────────
  django:
    image: ghcr.io/${GHCR_REPO}/vitali-backend:${IMAGE_TAG:-latest}
    restart: always
    env_file: ${PROD_ENV_FILE:-/etc/vitali/secrets.env}
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.production
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST:-localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/readiness/', headers={'Host': os.environ.get('HEALTHCHECK_HOST', 'localhost'), 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req, timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 2g
    cpus: 2.0

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery-worker:
    image: ghcr.io/${GHCR_REPO}/vitali-backend:${IMAGE_TAG:-latest}
    restart: always
    command: celery -A vitali worker --loglevel=info --concurrency=4
    env_file: ${PROD_ENV_FILE:-/etc/vitali/secrets.env}
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.production
      VITALI_ROLE: worker
      CELERY_DATABASE_URL: ${CELERY_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A vitali inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    cpus: 1.0

  # ─── Celery Beat ──────────────────────────────────────────────────────────
  celery-beat:
    image: ghcr.io/${GHCR_REPO}/vitali-backend:${IMAGE_TAG:-latest}
    restart: always
    command: celery -A vitali beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ${PROD_ENV_FILE:-/etc/vitali/secrets.env}
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.production
      VITALI_ROLE: beat
      CELERY_DATABASE_URL: ${CELERY_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A vitali inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    mem_limit: 256m
    cpus: 0.25

  # ─── Flower (Celery monitoring) ───────────────────────────────────────────
  # Behind HTTP basic auth. Exposed only on loopback by default — reach it via an
  # SSH tunnel or put it behind the nginx auth location. FLOWER_BASIC_AUTH=user:pass.
  flower:
    image: mher/flower:2.0
    restart: always
    command: celery --broker=redis://:${REDIS_PASSWORD}@redis:6379/0 flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH}
    environment:
      FLOWER_UNAUTHENTICATED_API: "false"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:5555:5555"
    mem_limit: 256m
    cpus: 0.25

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  nextjs:
    image: ghcr.io/${GHCR_REPO}/vitali-frontend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      DJANGO_API_URL: http://django:8000
    depends_on:
      - django
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0

  # ─── Vitali Imagem archive (DICOM + DICOMweb only) ──────────────────────
  orthanc:
    image: orthancteam/orthanc:26.6.1@sha256:83a1f988c9790a8ec018d00bad2d23d29703313e10ec59ecbeb827b5fa8e0aee
    restart: always
    environment:
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:?Set ORTHANC_USERNAME}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:?Set ORTHANC_PASSWORD}
      ORTHANC__REGISTERED_USERS: |
        {"${ORTHANC_USERNAME}": "${ORTHANC_PASSWORD}"}
      VITALI_WEBHOOK_URL: http://django:8000/api/v1/imaging/orthanc/webhook/
      VITALI_WEBHOOK_SECRET: ${ORTHANC_WEBHOOK_SECRET:?Set ORTHANC_WEBHOOK_SECRET}
    volumes:
      - ./docker/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./docker/orthanc/vitali-webhook.lua:/etc/orthanc/vitali-webhook.lua:ro
      - orthanc_data:/var/lib/orthanc/db
    ports:
      # REST stays host-local. Set ORTHANC_DICOM_BIND_ADDRESS to a trusted LAN
      # address only when modalities must send C-STORE directly to this host.
      - "127.0.0.1:8042:8042"
      - "${ORTHANC_DICOM_BIND_ADDRESS:-127.0.0.1}:4242:4242"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u $${ORTHANC_USERNAME}:$${ORTHANC_PASSWORD} http://127.0.0.1:8042/system || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 4
      start_period: 30s
    depends_on:
      django:
        condition: service_healthy
    mem_limit: 2g
    cpus: 2.0

  # ─── Vitali Imagem viewer (OHIF, pinned by docker/ohif/Dockerfile) ───────
  vitali-viewer:
    image: ghcr.io/${GHCR_REPO}/vitali-viewer:${IMAGE_TAG:-latest}
    restart: always
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/visualizador/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    cpus: 0.5

  # ─── Evolution API (WhatsApp) ─────────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:v2.2.3
    restart: always
    environment:
      SERVER_PORT: 8080
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/1
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${WHATSAPP_EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5

  # ─── DB Backup (offsite + encrypted) ──────────────────────────────────────
  # Runs by default in production. Installs gpg + aws-cli at startup so backup.sh
  # can encrypt and upload. Snapshots the relevant env into /etc/backup.env because
  # crond resets the environment.
  db-backup:
    image: postgres:16-alpine
    restart: always
    env_file: ${PROD_ENV_FILE:-/etc/vitali/secrets.env}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-vitali}
      POSTGRES_USER: ${POSTGRES_USER:-vitali}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      KEEP_LAST: ${BACKUP_KEEP_LAST:-30}
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backups:/backups
    command: >
      sh -c '
        apk add --no-cache gnupg aws-cli >/dev/null 2>&1 || apk add --no-cache gnupg py3-pip && pip install --quiet awscli || true;
        cp /usr/local/bin/backup.sh /tmp/backup.sh && chmod +x /tmp/backup.sh &&
        printenv | grep -E "^(POSTGRES_HOST|POSTGRES_PORT|POSTGRES_DB|POSTGRES_USER|POSTGRES_PASSWORD|BACKUP_DIR|KEEP_LAST|BACKUP_ENCRYPTION_KEY|BACKUP_S3_BUCKET|BACKUP_S3_ENDPOINT|BACKUP_S3_PREFIX|BACKUP_S3_ACCESS_KEY|BACKUP_S3_SECRET_KEY)=" \
          > /etc/backup.env &&
        chmod 600 /etc/backup.env &&
        mkdir -p /var/spool/cron/crontabs &&
        printf "0 2 * * *\t. /etc/backup.env && /tmp/backup.sh >> /proc/1/fd/1 2>&1\n" \
          > /var/spool/cron/crontabs/root &&
        crond -f -d 8
      '
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.25

  # ─── Certbot (TLS cert renewal) ───────────────────────────────────────────
  # Initial issuance is a one-time manual step (see docs/TLS.md). This service
  # renews every 12h. nginx reloads periodically to pick up renewed certs.
  certbot:
    image: certbot/certbot:latest
    restart: always
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM;
        while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

  # ─── Nginx Reverse Proxy (TLS) ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Both configs need envsubst so the internal Orthanc credential is never
      # baked into the image or sent to the browser.
      - ./docker/nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/templates/ssl.conf.template:ro
      - static_files:/app/staticfiles:ro
      # Cert live dir (host bind). Set TLS_LIVE_DIR=/etc/letsencrypt/live/<domain>.
      - ${TLS_LIVE_DIR:-/etc/letsencrypt/live/example.com}:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro
    environment:
      NGINX_ENVSUBST_FILTER: ^ORTHANC_AUTH_HEADER$
      ORTHANC_AUTH_HEADER: ${ORTHANC_AUTH_HEADER:?Set ORTHANC_AUTH_HEADER to the Basic authorization header matching ORTHANC_USERNAME/PASSWORD}
    depends_on:
      - django
      - nextjs
      - orthanc
      - vitali-viewer
    # Reload every 6h so renewed certs are picked up without a manual restart.
    command: >
      sh -c 'trap exit TERM;
        while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 128m
    cpus: 0.5

  # ─── Uptime Kuma (external health monitoring) ─────────────────────────────
  # Self-hosted uptime monitor. Configure monitors for the public frontend and
  # /health/ after first boot (UI on 127.0.0.1:3001, reach via SSH tunnel).
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: always
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3001:3001"
    mem_limit: 256m
    cpus: 0.25

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  backups:
  uptime_kuma_data:
  orthanc_data:
