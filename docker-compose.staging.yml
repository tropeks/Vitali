# Vitali — Staging Compose
# ─────────────────────────────────────────────────────────────────────────────
# Differences from docker-compose.yml (dev):
#   - DJANGO_SETTINGS_MODULE: production (DEBUG=False, HTTPS, pooling, JSON logs)
#   - restart: always (survived reboots + container crashes)
#   - DB and Redis do NOT expose host ports (internal only)
#   - Nginx with real domain config (HTTP only — terminate TLS at load balancer or
#     configure certbot separately)
#   - Images pulled from GHCR (built by deploy-staging.yml CI), not built locally
#   - Per-service resource limits (mem_limit/cpus) so one runaway container cannot
#     starve the host; healthchecks on every service for visibility.
#
# Usage:
#   cp .env.staging.example .env.staging
#   # fill in all required vars (see docs/DEPLOY.md)
#   GHCR_REPO=tropeks docker compose -p vitali-staging --env-file .env.staging -f docker-compose.staging.yml up -d

services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    # PVE/LXC nested AppArmor can deny PostgreSQL's Unix socket creation.
    security_opt:
      - apparmor=unconfined
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitali}
      POSTGRES_USER: ${POSTGRES_USER:-vitali}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitali}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    # No host port exposure — reachable only within the compose network

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5
    # No host port exposure

  # ─── Django (Gunicorn) ────────────────────────────────────────────────────
  django:
    image: ghcr.io/${GHCR_REPO}/vitali-backend:${IMAGE_TAG:-latest}
    restart: always
    env_file: ${STAGING_ENV_FILE:-.env.staging}
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.production
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST:-vitali.qtec.me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/health/', headers={'Host': os.environ.get('HEALTHCHECK_HOST', 'localhost'), 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req, timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1g
    cpus: 1.5

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery-worker:
    image: ghcr.io/${GHCR_REPO}/vitali-backend:${IMAGE_TAG:-latest}
    restart: always
    command: celery -A vitali worker --loglevel=info --concurrency=2
    env_file: ${STAGING_ENV_FILE:-.env.staging}
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A vitali inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    cpus: 1.0

  # ─── Celery Beat ──────────────────────────────────────────────────────────
  celery-beat:
    image: ghcr.io/${GHCR_REPO}/vitali-backend:${IMAGE_TAG:-latest}
    restart: always
    command: celery -A vitali beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ${STAGING_ENV_FILE:-.env.staging}
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Beat has no native ping; broker-reachability proxy (a live worker answers).
      test: ["CMD-SHELL", "celery -A vitali inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    mem_limit: 256m
    cpus: 0.25

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  nextjs:
    image: ghcr.io/${GHCR_REPO}/vitali-frontend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      DJANGO_API_URL: http://django:8000
    depends_on:
      - django
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0

  # ─── Orthanc archive (DICOM + DICOMweb only) ──────────────────────────────
  orthanc:
    image: orthancteam/orthanc:26.6.1@sha256:83a1f988c9790a8ec018d00bad2d23d29703313e10ec59ecbeb827b5fa8e0aee
    restart: always
    environment:
      ORTHANC_USERNAME: ${ORTHANC_USERNAME}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
      ORTHANC__REGISTERED_USERS: |
        {"${ORTHANC_USERNAME}": "${ORTHANC_PASSWORD}"}
      VITALI_WEBHOOK_URL: http://django:8000/api/v1/imaging/orthanc/webhook/
      VITALI_WEBHOOK_SECRET: ${ORTHANC_WEBHOOK_SECRET}
    volumes:
      - ./docker/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./docker/orthanc/vitali-webhook.lua:/etc/orthanc/vitali-webhook.lua:ro
      - orthanc_data:/var/lib/orthanc/db
    ports:
      - "127.0.0.1:8042:8042"
      - "127.0.0.1:4242:4242"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u $${ORTHANC_USERNAME}:$${ORTHANC_PASSWORD} http://127.0.0.1:8042/system || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 4
      start_period: 30s
    depends_on:
      django:
        condition: service_started
    mem_limit: 1g
    cpus: 1.0

  # ─── Vitali Imagem (OHIF 3.12.8 standalone) ───────────────────────────────
  vitali-viewer:
    image: ghcr.io/${GHCR_REPO}/vitali-viewer:${IMAGE_TAG:-latest}
    restart: always
    # PVE's nested AppArmor profile blocks nginx-unprivileged socketpair().
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/visualizador/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 256m
    cpus: 0.25

  # ─── Evolution API (WhatsApp) ─────────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:v2.2.3
    restart: always
    environment:
      SERVER_PORT: 8080
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/1
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${WHATSAPP_EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 0.5

  # ─── DB Backup ────────────────────────────────────────────────────────────
  # Optional service — activate with: --profile backup
  # Runs scripts/backup.sh daily at 02:00 UTC via busybox crond.
  # Backups land in the `backups` named volume (see docs/BACKUPS.md).
  # Tune retention: BACKUP_KEEP_LAST=7 (default) in .env.staging.
  db-backup:
    image: postgres:16-alpine
    restart: always
    profiles:
      - backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-vitali}
      POSTGRES_USER: ${POSTGRES_USER:-vitali}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      KEEP_LAST: ${BACKUP_KEEP_LAST:-7}
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backups:/backups
    # Runs backup.sh at 02:00 UTC daily via busybox crond (built into alpine).
    # crond resets the process environment, so we snapshot the container env into
    # /etc/backup.env at startup; the cron job sources it before calling backup.sh.
    command: >
      sh -c '
        chmod +x /usr/local/bin/backup.sh &&
        printenv | grep -E "^(POSTGRES_HOST|POSTGRES_PORT|POSTGRES_DB|POSTGRES_USER|POSTGRES_PASSWORD|BACKUP_DIR|KEEP_LAST)=" \
          > /etc/backup.env &&
        chmod 600 /etc/backup.env &&
        mkdir -p /var/spool/cron/crontabs &&
        printf "0 2 * * *\t. /etc/backup.env && /usr/local/bin/backup.sh >> /proc/1/fd/1 2>&1\n" \
          > /var/spool/cron/crontabs/root &&
        crond -f -d 8
      '
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.1

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    # PVE/LXC nested AppArmor also blocks nginx worker socketpair().
    security_opt:
      - apparmor=unconfined
    ports:
      - "${STAGING_HTTP_PORT:-8090}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - static_files:/app/staticfiles:ro
    environment:
      NGINX_ENVSUBST_FILTER: ^ORTHANC_AUTH_HEADER$
      ORTHANC_AUTH_HEADER: ${ORTHANC_AUTH_HEADER:?Set ORTHANC_AUTH_HEADER to a Basic authorization header}
    depends_on:
      - django
      - nextjs
      - orthanc
      - vitali-viewer
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 128m
    cpus: 0.25

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  backups:
  orthanc_data:
