# Opt-in, single-host observability overlay. No service is publicly exposed.
services:
  django:
    environment:
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: vitali-backend
    depends_on:
      otel-collector:
        condition: service_healthy

  celery-worker:
    environment:
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: vitali-worker
    depends_on:
      otel-collector:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.157.0@sha256:f2f01157055a9b2aab9df7118e1f1c9abf345e99b23bc7a2bc791db374a7d0f6
    restart: always
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol-contrib/config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 512m
    cpus: 0.5

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.20.1@sha256:ac5ec343104fae0e2d84a27bb8d69b38430a11910c5382cad85d478d2bab713e
    restart: always
    environment:
      DATA_SOURCE_URI: postgres:5432/${POSTGRES_DB:-vitali}?sslmode=disable
      DATA_SOURCE_USER: ${POSTGRES_USER:-vitali}
      DATA_SOURCE_PASS_FILE: /run/secrets/postgres_exporter_password
    volumes:
      - ${POSTGRES_EXPORTER_PASSWORD_FILE:-/etc/vitali/postgres-exporter-password}:/run/secrets/postgres_exporter_password:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/postgres_exporter", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 128m
    cpus: 0.2

  redis-exporter:
    image: oliver006/redis_exporter:v1.87.0@sha256:9ca6f929a8abc518d78158757922444f1cf807661a2238f44b28c3cd08a1b652
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_exporter_passwords.json
    volumes:
      - ${REDIS_EXPORTER_PASSWORD_FILE:-/etc/vitali/redis-exporter-passwords.json}:/run/secrets/redis_exporter_passwords.json:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/redis_exporter", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 96m
    cpus: 0.1

  node-exporter:
    image: prom/node-exporter:v1.12.1@sha256:1b4e4438faca4dd7e001dd445d161a4a2091b0fededa84093b3a8dfeae1f1be0
    restart: always
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
    volumes:
      - /:/host:ro,rslave
    pid: host
    healthcheck:
      test: ["CMD", "/bin/node_exporter", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 96m
    cpus: 0.1

  prometheus:
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-20GB}
      - --web.enable-lifecycle
    volumes:
      - ./docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./docker/observability/targets/rabbitmq-empty.json:/etc/prometheus/targets/rabbitmq.json:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - otel-collector
      - postgres-exporter
      - redis-exporter
      - node-exporter
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 2g
    cpus: 1.0

  grafana:
    image: grafana/grafana:13.1.1@sha256:7cb8c64c4d57a57e734073f3cc94620adb24a0acb929bd80ba9f14017e3a975b
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-vitali-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Loopback/SSH profile is HTTP. Set true when Grafana is behind private TLS.
      GF_SECURITY_COOKIE_SECURE: ${GRAFANA_COOKIE_SECURE:-false}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ${GRAFANA_ADMIN_PASSWORD_FILE:-/etc/vitali/grafana-admin-password}:/run/secrets/grafana_admin_password:ro
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3002}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 768m
    cpus: 0.5

volumes:
  prometheus_data:
  grafana_data:
