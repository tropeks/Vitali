# HTTPS server blocks — operator-enabled.
#
# The stack boots without this file; the :80 server in nginx.conf (default.conf)
# continues to work normally.  When this file is mounted, the redirect block below
# claims listen 80 default_server and takes over all plain-HTTP traffic → HTTPS.
#
# To activate (see docs/TLS.md for full instructions):
#   1. Provision certificates at /etc/nginx/ssl/fullchain.pem + privkey.pem.
#   2. Add to the nginx service in docker-compose:
#        ports:
#          - "443:443"
#        volumes:
#          - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
#          - /etc/letsencrypt/live/<domain>:/etc/nginx/ssl:ro
#   3. docker compose up -d --no-deps nginx

# HTTP → HTTPS redirect (takes priority over the plain :80 block in nginx.conf
# because default_server is set here).
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── Certificates ────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── Protocols & ciphers (Mozilla Intermediate) ──────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── Session resumption ──────────────────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── HSTS (1 year) ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $django_upstream http://django:8000;
    set $nextjs_upstream http://nextjs:3000;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                             always;
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;

    client_max_body_size 50M;

    # Health check (no rate limit)
    location /health/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    # Django API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/token/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django Admin
    location /admin/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django static files
    location /static/ {
        proxy_pass $django_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js frontend (everything else)
    location / {
        proxy_pass $nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
