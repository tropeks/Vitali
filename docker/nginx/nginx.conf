# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}


server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $django_upstream http://django:8000;
    set $nextjs_upstream http://nextjs:3000;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy: restrict camera/mic to same-origin (needed by the AI Clinical
    # Scribe getUserMedia/Web Speech capture and telemedicine); geolocation is unused, so disabled.
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    # Browser-facing CSP is emitted by Next.js middleware with a per-request nonce.
    # Do not set a static nginx CSP here; it conflicts with Next.js inline bootstrap scripts.

    client_max_body_size 50M;

    # ACME HTTP-01 challenge (certbot --webroot). Served on plain :80 so cert
    # issuance/renewal works; harmless when TLS is not in use.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check (no rate limit)
    location /health/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    # Next.js API routes (like /api/auth/)
    location /api/auth/ {
        proxy_pass $nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # Django API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/token/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django Admin
    location /admin/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django static files
    location /static/ {
        proxy_pass $django_upstream;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Orthanc PACS: OHIF viewer + DICOMweb (E-012) ─────────────────────────
    # The OHIF viewer is embedded same-origin in the encounter page, so /ohif/
    # must allow SAMEORIGIN framing (the server-wide X-Frame-Options is DENY; a
    # location-level add_header replaces it for these responses only).
    set $orthanc_upstream http://orthanc:8042;

    location /ohif/ {
        proxy_pass $orthanc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # DICOMweb (QIDO/WADO) — consumed by the OHIF viewer to fetch pixel data.
    location /dicom-web/ {
        proxy_pass $orthanc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Next.js frontend (everything else)
    location / {
        proxy_pass $nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
