# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}


server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $django_upstream http://django:8000;
    set $nextjs_upstream http://nextjs:3000;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy: restrict camera/mic to same-origin (needed by the AI Clinical
    # Scribe getUserMedia/Web Speech capture and telemedicine); geolocation is unused, so disabled.
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    # Browser-facing CSP is emitted by Next.js middleware with a per-request nonce.
    # Do not set a static nginx CSP here; it conflicts with Next.js inline bootstrap scripts.

    client_max_body_size 50M;

    # ACME HTTP-01 challenge (certbot --webroot). Served on plain :80 so cert
    # issuance/renewal works; harmless when TLS is not in use.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check (no rate limit)
    location /health/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    # Next.js API routes (like /api/auth/)
    location /api/auth/ {
        proxy_pass $nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # Django API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # This nginx sits behind Cloudflare Tunnel/TLS in beta. Django production
        # settings use SECURE_SSL_REDIRECT, so API requests must arrive as https
        # or POST endpoints such as CSP reports get redirected and dropped.
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/token/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django Admin
    location /admin/ {
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django static files
    location /static/ {
        alias /app/staticfiles/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Vitali Imagem: embedded viewer + DICOMweb (E-012) ────────────────────
    # The viewer is embedded same-origin in the encounter page, so its route
    # must allow SAMEORIGIN framing (the server-wide X-Frame-Options is DENY; a
    # location-level add_header replaces it for these responses only).
    set $orthanc_upstream http://orthanc:8042;

    # Validate the Vitali JWT and imaging.read permission before exposing PACS.
    # This subrequest is internal, has no response body, and is tenant-aware.
    location = /_auth/orthanc {
        internal;
        proxy_pass $django_upstream/api/v1/portal/me/imaging-viewer-auth/;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # DICOMweb requests advertise multipart/binary response types that DRF
        # cannot negotiate for this bodyless authorization subrequest.
        proxy_set_header Accept "application/json";
        proxy_set_header Authorization "Bearer $cookie_access_token";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location /visualizador/ {
        auth_request /_auth/orthanc;
        proxy_pass http://vitali-viewer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
        add_header Cache-Control "private, no-store" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # DICOMweb (QIDO/WADO) — consumed by Vitali Imagem to fetch pixel data.
    location /imagens-dicom/ {
        # The viewer is read-only. Never let a read grant reach STOW-RS or
        # vendor-specific mutation endpoints exposed by the archive.
        limit_except GET HEAD { deny all; }
        auth_request /_auth/orthanc;
        proxy_pass $orthanc_upstream;
        proxy_set_header Authorization "${ORTHANC_AUTH_HEADER}";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_read_timeout 120s;
        add_header Cache-Control "private, no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Upstream product routes are intentionally not part of the public surface.
    location /ohif/ { return 404; }
    location /dicom-web/ { return 404; }

    # Next.js frontend (everything else)
    location / {
        proxy_pass $nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
