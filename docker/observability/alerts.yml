groups:
  - name: vitali-availability
    rules:
      - alert: VitaliTelemetryTargetDown
        expr: up == 0
        for: 5m
        labels: {severity: critical}
        annotations:
          summary: "Telemetry target {{ $labels.job }} is down"
      - alert: VitaliHighServerErrorRatio
        expr: >-
          sum(rate(vitali_calls_total{status_code=~"STATUS_CODE_ERROR|5.."}[5m]))
          / clamp_min(sum(rate(vitali_calls_total[5m])), 1) > 0.01
        for: 10m
        labels: {severity: critical}
        annotations:
          summary: "Vitali server error ratio exceeds 1%"
  - name: vitali-capacity
    rules:
      - alert: VitaliHostDiskLow
        expr: >-
          node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
          / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} < 0.15
        for: 15m
        labels: {severity: warning}
        annotations:
          summary: "Less than 15% disk free on {{ $labels.mountpoint }}"
      - alert: VitaliRedisMemoryHigh
        expr: redis_memory_max_bytes > 0 and redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 15m
        labels: {severity: warning}
        annotations:
          summary: "Redis memory exceeds 85% of configured maximum"
      - alert: VitaliPostgresConnectionsHigh
        expr: sum(pg_stat_activity_count) / clamp_min(pg_settings_max_connections, 1) > 0.80
        for: 15m
        labels: {severity: warning}
        annotations:
          summary: "PostgreSQL connections exceed 80%"
