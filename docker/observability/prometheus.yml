global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: vitali
    topology: single-host

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [prometheus:9090]
  - job_name: vitali-spanmetrics
    static_configs:
      - targets: [otel-collector:8889]
  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
  - job_name: host
    static_configs:
      - targets: [node-exporter:9100]
  - job_name: rabbitmq
    file_sd_configs:
      - files: [/etc/prometheus/targets/rabbitmq.json]
