# docker-compose.override.yml — Development overrides
# Applied automatically when running `docker-compose up` locally.
# NOT used in production (use docker-compose.yml directly).

services:
  django:
    build:
      context: ./backend
      args:
        # Bakes pytest/ruff/mypy/factory-boy/django-stubs into the image so
        # `make test|lint|typecheck` work without `pip install` after every
        # container recreate. Production builds (docker-compose.yml only) leave
        # this unset (default false) and stay slim.
        INSTALL_DEV: "true"
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.development
      DATABASE_URL: postgres://vitali:vitali@postgres:5432/${POSTGRES_DB:-vitali}
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    command: celery -A vitali worker -l debug --concurrency 2
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.development
    volumes:
      - ./backend:/app

  celery-beat:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    environment:
      DJANGO_SETTINGS_MODULE: vitali.settings.development
    volumes:
      - ./backend:/app

  nextjs:
    # Install the exact locked dependency tree into the node_modules volume, then run dev server.
    # npm in the Linux container may normalize optional platform metadata, so preserve the host lockfile.
    command: sh -c "cp package-lock.json /tmp/package-lock.json && trap 'cp /tmp/package-lock.json package-lock.json' EXIT && npm ci && cp /tmp/package-lock.json package-lock.json && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # Server-side API routes run inside the container — must use the Docker service
      # name to reach Django, not localhost (which refers to the Next.js container itself).
      DJANGO_API_URL: http://django:8000
      # Must be "development" when running next dev — the Dockerfile bakes in
      # NODE_ENV=production for the production runner stage, but dev mode needs
      # development so the Edge Runtime sandbox permits eval() (webpack source maps).
      NODE_ENV: development
