[tool.ruff]
target-version = "py312"
line-length = 100
src = [".", "apps"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "DJ",  # flake8-django
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # do not perform function calls in default arguments
    "F405",   # star imports in settings files
    "F403",   # star imports
]

[tool.ruff.lint.per-file-ignores]
"vitali/settings/*.py" = ["F401", "F403", "F405", "E402"]
"*/migrations/*.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
ignore_missing_imports = true
warn_unused_ignores = true
strict = false

[tool.django-stubs]
django_settings_module = "vitali.settings.development"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "vitali.settings.development"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = "--reuse-db -v --cov=apps --cov-report=term-missing"

[tool.coverage.run]
source = ["apps"]
omit = ["*/migrations/*", "*/tests/*"]
