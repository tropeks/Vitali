services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitali}
      POSTGRES_USER: vitali
      POSTGRES_PASSWORD: vitali
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitali -d ${POSTGRES_DB:-vitali}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django (Gunicorn) ────────────────────────────────────────────────────
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://vitali:vitali@postgres:5432/${POSTGRES_DB:-vitali}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-vitali.settings.production}
      E2E_MODE: ${E2E_MODE:-false}
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A vitali worker -l info --concurrency 4
    env_file: .env
    environment:
      DATABASE_URL: postgres://vitali:vitali@postgres:5432/${POSTGRES_DB:-vitali}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-vitali.settings.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A vitali beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgres://vitali:vitali@postgres:5432/${POSTGRES_DB:-vitali}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-vitali.settings.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Evolution API (WhatsApp Gateway) ────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379/1
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${WHATSAPP_EVOLUTION_API_KEY:-change-me}
      WEBHOOK_GLOBAL_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://django:8000
      DJANGO_API_URL: http://django:8000
    ports:
      - "3000:3000"
    depends_on:
      - django

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - django
      - nextjs

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
