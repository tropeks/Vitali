services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Required by nested PVE/LXC hosts for PostgreSQL Unix socket creation.
    security_opt:
      - apparmor=unconfined
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitali}
      POSTGRES_USER: vitali
      POSTGRES_PASSWORD: vitali
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitali -d ${POSTGRES_DB:-vitali}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django (Gunicorn) ────────────────────────────────────────────────────
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://vitali:vitali@postgres:5432/${POSTGRES_DB:-vitali}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-vitali.settings.production}
      E2E_MODE: ${E2E_MODE:-false}
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A vitali worker -l info --concurrency 4
    healthcheck:
      # `inspect ping` confirms the worker is alive and can reach the broker.
      test: ["CMD-SHELL", "celery -A vitali inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    env_file: .env
    environment:
      DATABASE_URL: postgres://vitali:vitali@postgres:5432/${POSTGRES_DB:-vitali}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-vitali.settings.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A vitali beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      # Beat has no native ping; this is a broker-reachability proxy (a live
      # worker answers). Adequate as a stack liveness signal — nothing gates on it.
      test: ["CMD-SHELL", "celery -A vitali inspect ping -t 10 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    env_file: .env
    environment:
      DATABASE_URL: postgres://vitali:vitali@postgres:5432/${POSTGRES_DB:-vitali}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-vitali.settings.production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Evolution API (WhatsApp Gateway) ────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:v2.2.3
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379/1
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${WHATSAPP_EVOLUTION_API_KEY:-change-me}
      WEBHOOK_GLOBAL_ENABLED: "false"
    ports:
      - "8080:8080"
    healthcheck:
      # evolution-api is a Node app; use node itself (no curl/wget assumed in image).
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  # ─── Orthanc archive (DICOM + DICOMweb; UI is a separate service) ─────────
  orthanc:
    image: orthancteam/orthanc:26.6.1@sha256:83a1f988c9790a8ec018d00bad2d23d29703313e10ec59ecbeb827b5fa8e0aee
    restart: unless-stopped
    environment:
      # Folded into orthanc.json by the orthancteam image at startup. Keeps the
      # Orthanc REST API behind basic auth; Vitali uses the same creds (ORTHANC_*).
      ORTHANC__REGISTERED_USERS: |
        {"${ORTHANC_USERNAME:-vitali}": "${ORTHANC_PASSWORD:-vitali}"}
      # Push ingestion → Django webhook. The bare host `django` resolves to the
      # public schema (SHOW_PUBLIC_IF_NO_TENANT_FOUND in dev) so the match fans
      # out across all tenants. The secret must equal ORTHANC_WEBHOOK_SECRET.
      VITALI_WEBHOOK_URL: http://django:8000/api/v1/imaging/orthanc/webhook/
      VITALI_WEBHOOK_SECRET: ${ORTHANC_WEBHOOK_SECRET:-change-me-orthanc-webhook}
    volumes:
      - ./docker/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./docker/orthanc/vitali-webhook.lua:/etc/orthanc/vitali-webhook.lua:ro
      - orthanc_data:/var/lib/orthanc/db
    ports:
      - "8042:8042"  # REST API + DICOMweb
      - "4242:4242"  # DICOM C-STORE (modalities push studies here)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u $${ORTHANC_USERNAME:-vitali}:$${ORTHANC_PASSWORD:-vitali} http://localhost:8042/system || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      django:
        condition: service_started

  # ─── Vitali Imagem (OHIF 3.12.8, standalone and white-label) ──────────────
  vitali-viewer:
    build:
      context: ./docker/ohif
    image: vitali-viewer:local
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/visualizador/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://django:8000
      DJANGO_API_URL: http://django:8000
    ports:
      - "3000:3000"
    depends_on:
      - django

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - static_files:/app/staticfiles:ro
    environment:
      NGINX_ENVSUBST_FILTER: ^ORTHANC_AUTH_HEADER$
      ORTHANC_AUTH_HEADER: ${ORTHANC_AUTH_HEADER:-Basic dml0YWxpOnZpdGFsaQ==}
    depends_on:
      - django
      - nextjs
      - orthanc
      - vitali-viewer
    healthcheck:
      # busybox wget ships in nginx:alpine; /health/ proxies to Django.
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  orthanc_data:
